services:
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    ports:
      - "29092:29092"   # External access
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes

      # Dual listener setup
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL

    depends_on:
      - zookeeper
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
  client:
    build:
      context: ./client
      target: builder
    command: npm run dev
    container_name: client
    ports:
      - "4000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./client/.env.docker
    depends_on:
      - api-gateway


  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
  auth-service:
    build:
      context: ./auth-service
      target: builder
    command: npm run dev
    container_name: auth-service
    ports:
      - "3001:3000"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    env_file:
      - ./auth-service/.env.docker
    depends_on:
      - redis
      - mongodb

  url-generation-service:
    build:
      context: ./url-generate-service
      target: builder
    command: npm run dev
    container_name: url-generation-service
    ports:
      - "3002:3000"
    volumes:
      - ./url-generate-service:/app
      - /app/node_modules
    env_file:
      - ./url-generate-service/.env.docker
    depends_on:
      - zookeeper
      - redis
      - mongodb

  redirect-service:
    build:
      context: ./redirect-service
      target: builder
    command: npm run dev
    container_name: redirect-service
    ports:
      - "3003:3000"
    volumes:
      - ./redirect-service:/app
      - /app/node_modules
    env_file:
      - ./redirect-service/.env.docker
    depends_on:
      - redis
      - mongodb

  analytics-service:
    build: ./analytics-service
    command: npm run dev
    container_name: analytics-service
    ports:
      - "3004:3000"
    volumes:
      - ./analytics-service:/app
      - /app/node_modules
    env_file:
      - ./analytics-service/.env.docker
    depends_on:
      - kafka
      - mongodb

  api-gateway:
    build:
      context: ./api-gateway
      target: builder
    command: npm run dev
    container_name: api-gateway
    ports:
      - "10000:3000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    env_file:
      - ./api-gateway/.env.docker
    depends_on:
      - auth-service
      - url-generation-service
      - redirect-service
      - analytics-service
volumes:
  mongo_data:
